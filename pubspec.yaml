version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.1
  uuid: ^4.3.3
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  fl_chart: ^0.68.0
